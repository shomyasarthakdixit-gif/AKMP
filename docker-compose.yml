version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: akmp_postgres
    environment:
      POSTGRES_USER: akmp_user
      POSTGRES_PASSWORD: akmp_password
      POSTGRES_DB: akmp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
